name: "Create release branch"

on:
  workflow_dispatch:
    inputs:
      release_version:
        required: true
        type: string
        default: '0.0'
      source_branch:
        required: false
        type: string
        default: 'main'
      branch_prefix:
        required: false
        type: string
        default: 'release-'
      update:
        type: boolean
        default: false
      dry_run:
        type: boolean
        default: false


defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  create:
    name: Create release branch
    if: github.repository == 'nginx/kubernetes-ingress'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout NIC repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.source_branch }}

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_COMMON_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_COMMON_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_COMMON_VAULT_SUBSCRIPTION_ID }}

      - name: Get secrets from vault
        uses: nginx/ci-self-hosted/.github/actions/get-from-vault@5c3e1f8b51f66a851fdba80f70e19cf966199730 # main @ 2026-05-22
        with:
          vault-name: ${{ secrets.COMMON_KEYVAULT_NAME }}
          secret-names: "nginx-bot-nic-create-branch-app-client-id, nginx-bot-nic-create-branch-app-private-key"
          env-names: "APP_CLIENT_ID, APP_PRIVATE_KEY_B64"

      - name: Decode GitHub App private key
        id: app_key
        run: |
          private_key=$(echo "$APP_PRIVATE_KEY_B64" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | sed 's/\\n$//')
          echo "::add-mask::$private_key"
          echo "private_key=$private_key" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.APP_CLIENT_ID }}
          private-key: ${{ steps.app_key.outputs.private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Create new release branch
        run: |
          branch="${{ inputs.branch_prefix }}${{ inputs.release_version }}"
          if git rev-parse --verify remotes/origin/${branch}; then
            git checkout ${branch}
            git pull
            if ${{ inputs.update }}; then
              echo "Updating from ${{ inputs.source_branch }}."
              git merge -Xtheirs ${{ inputs.source_branch }} -m "chore: Merge branch ${{ inputs.source_branch }} into ${branch}"
            else
              echo "UPDATE not requested.  Not making any changes"
            fi
          else
            git checkout -b ${branch}
          fi

          echo "Pushing to branch $branch"
          if ! ${{ inputs.dry_run }}; then
              git push origin "${branch}"
          else
              echo "DRY RUN not making any changes"
              git push --dry-run origin "${branch}"
          fi
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
