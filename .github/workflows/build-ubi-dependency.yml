name: Build UBI Dependencies

on:
  push:
    branches:
      - main
    paths:
      - build/dependencies/Dockerfile.ubi10
      - .github/workflows/build-ubi-dependency.yml
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/nginx/dependencies/nginx-ubi

concurrency:
  group: ${{ github.ref_name }}-ubi-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build Binary Container Image
    if: github.repository == 'nginx/kubernetes-ingress'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        tag: ["ubi10"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_VAULT_SUBSCRIPTION_ID }}

      - name: Setup secrets
        run: |
          RHEL_CREDS=$(az keyvault secret show --name rhel-creds --vault-name ${{ secrets.NIC_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$RHEL_CREDS"
          echo "$RHEL_CREDS" > rhel_license
          PLUS_CREDS=$(az keyvault secret show --name plus-creds --vault-name ${{ secrets.NIC_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$PLUS_CREDS"
          IFS=@ CERT=$(echo "$PLUS_CREDS" | jq -r '.crt')
          while read -r line; do
            echo "::add-mask::${line}"
          done <<< "${CERT}"
          echo "$CERT" > nginx-repo.crt
          IFS=@ KEY=$(echo "$PLUS_CREDS" | jq -r '.key')
          while read -r line; do
            echo "::add-mask::${line}"
          done <<< "${KEY}"
          echo "$KEY" > nginx-repo.key

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            name=${{ env.IMAGE_NAME }},enable=true
          tags: |
            type=raw,value=${{ matrix.tag }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ matrix.tag }}-${{ steps.ref.outputs.name }},enable=${{ github.ref_name != 'main' }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: ./.github/actions/build-push-retry
        with:
          file: ./build/dependencies/Dockerfile.${{ matrix.tag }}
          context: "."
          pull: true
          push: true
          platforms: "linux/amd64,linux/arm64"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=nginx-${{ matrix.tag }}
          target: final
          sbom: false
          provenance: mode=max
          secret-files: |
            rhel_license=rhel_license
            nginx-repo.crt=nginx-repo.crt
            nginx-repo.key=nginx-repo.key

      - name: Clean up secrets
        if: always()
        run: rm -f rhel_license nginx-repo.*
