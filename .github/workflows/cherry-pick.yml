name: "Cherry-pick dependencies to release branch"
on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  cherry_pick_to_release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-24.04
    name: Cherry pick into release branch
    if: ${{ github.event.issue.pull_request.merged_at != null }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Actor is a Member of one of the teams
        uses: im-open/is-actor-team-member@6633b6e4d9bd2a6917f976b14c64626902e13805 # v1.2.0
        with:
          github-actor: ${{ github.actor }}
          github-organization: ${{ github.repository_owner}}
          github-team-slugs: |
            [
              "nic",
              "nginx-docs"
            ]
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release branch variable
        id: branch
        env:
          comment_body: ${{ github.event.comment.body }}
        run: |
          regex="/cherry-pick to (release-[2-9]+\.[0-9]+)"
          if [[ "${comment_body}" =~ $regex ]]; then
            branch=${BASH_REMATCH[1]}
            if git branch -a | egrep '^\s+remotes/origin/release' | grep -q "${branch}"; then
              echo "branch=${branch}" >> $GITHUB_OUTPUT
            else
              echo "branch=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_COMMON_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_COMMON_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_COMMON_VAULT_SUBSCRIPTION_ID }}

      - name: Setup secrets
        id: secrets
        run: |
          echo "Setting secrets for job"
          NGINX_PAT=$(az keyvault secret show --name nginx-bot-pat --vault-name ${{ secrets.COMMON_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$NGINX_PAT"
          echo "NGINX_PAT=$NGINX_PAT" >> $GITHUB_OUTPUT

      - name: Cherry pick into ${{ steps.branch.outputs.branch }}
        if: ${{ steps.branch.outputs.branch }}
        uses: carloscastrojumo/github-cherry-pick-action@503773289f4a459069c832dc628826685b75b4b3 # v1.0.10
        with:
          branch: ${{ steps.branch.outputs.branch }}
          token: ${{ steps.secrets.outputs.NGINX_PAT }}
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          title: "[cherry-pick] {old_title}"
