name: Test GitHub App Token

on:
  push:
    branches:
      - chore/test-app-token


defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test-app-token:
    name: Test GitHub App Token
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # for OIDC login
    steps:
      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_COMMON_VAULT_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_COMMON_VAULT_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_COMMON_VAULT_SUBSCRIPTION_ID }}

      - name: Setup secrets
        id: secrets
        run: |
          NGINX_APP_ID=$(az keyvault secret show --name nginx-bot-helm-app-id --vault-name ${{ secrets.COMMON_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$NGINX_APP_ID"
          echo "NGINX_APP_ID=$NGINX_APP_ID" >> $GITHUB_OUTPUT
          NGINX_APP_PRIVATE_KEY_B64=$(az keyvault secret show --name nginx-bot-helm-app-private-key --vault-name ${{ secrets.COMMON_KEYVAULT_NAME }} --query value -o tsv)
          echo "::add-mask::$NGINX_APP_PRIVATE_KEY_B64"
          NGINX_APP_PRIVATE_KEY=$(echo "$NGINX_APP_PRIVATE_KEY_B64" | base64 -d)
          while IFS= read -r line; do
            echo "::add-mask::$line"
          done <<< "$NGINX_APP_PRIVATE_KEY"
          delimiter=$(openssl rand -hex 8)
          echo "NGINX_APP_PRIVATE_KEY<<${delimiter}" >> $GITHUB_OUTPUT
          echo "$NGINX_APP_PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ steps.secrets.outputs.NGINX_APP_ID }}
          private-key: ${{ steps.secrets.outputs.NGINX_APP_PRIVATE_KEY }}
          owner: nginxinc
          repositories: helm-charts

      - name: Verify token works
        run: |
          echo "Token generated successfully"
          echo "Token length: ${#TOKEN}"
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Test checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nginxinc/helm-charts
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
          path: helm-charts

      - name: Verify checkout
        run: |
          echo "Checkout successful"
          ls -la helm-charts/
