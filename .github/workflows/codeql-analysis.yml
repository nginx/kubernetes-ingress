name: "CodeQL"

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
      - main
  merge_group:
  schedule:
    - cron: "36 6 * * 4" # run every Thursday at 06:36 UTC

concurrency:
  group: ${{ github.ref_name }}-codeql
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks and variables
    if: github.repository == 'nginx/kubernetes-ingress'
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && steps.docs.outputs.docs_only == 'true' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Filter only docs changes
        id: docs
        run: |
          ./.github/scripts/variables.sh docs_only >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
        shell: bash --noprofile --norc -o pipefail {0}

  analyze:
    if: github.repository == 'nginx/kubernetes-ingress' && (needs.checks.outputs.docs_only != 'true')
    needs: [checks]
    name: Analyze
    permissions:
      actions: read # for github/codeql-action/init to get workflow details
      contents: read # for actions/checkout to fetch code
      packages: read
      security-events: write # for github/codeql-action/autobuild to send a status report
    uses: nginx/compliance-rules/.github/workflows/codeql.yml@543d32464b56e6a695939f41ba8009cbb10e413a # v0.3.3
    with:
      requested_languages: go,python

  codeql-results:
    name: CodeQL Results
    # Single aggregator so branch protection can require just this one check.
    # Always runs (unless the whole workflow is cancelled); fails if any job
    # failed or was cancelled, treating "skipped" (e.g. docs-only) as OK.
    if: >-
      github.repository == 'nginx/kubernetes-ingress' && (
      !cancelled() )
    runs-on: ubuntu-24.04
    needs: [checks, analyze]
    steps:
      - name: Check results of all CodeQL jobs
        env:
          FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "${FAILED}" = "true" ]; then
            echo "::error::CodeQL analysis failed or was cancelled."
            exit 1
          fi
          echo "CodeQL analysis succeeded or was safely skipped."
