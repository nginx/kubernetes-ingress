apiVersion: k8s.nginx.org/v1
kind: Policy
metadata:
  name: waf-policy
spec:
  waf:
    enable: true
    apBundleSource:
      type: NIM
      url: "https://<nim_host>"
      policyName: "<policy_name>"
      secret: "nim-credentials"
      pollInterval: "5m"
    securityLogs:
    - enable: true
      apLogBundleSource:
        type: NIM
        url: "https://<nim_host>"
        policyName: "<log_profile_name>"
        secret: "nim-credentials"
      logDest: "stderr"
