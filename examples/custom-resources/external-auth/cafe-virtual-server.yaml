apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: cafe
spec:
  policies:
    - name: external-auth-basic-policy
  host: cafe.example.com
  tls:
    secret: tls-secret
    redirect:
      enable: true
  upstreams:
  - name: tea
    service: tea-svc
    port: 80
  - name: coffee
    service: coffee-svc
    port: 80
  routes:
  # Basic-auth protected route
  - path: /tea
    action:
      pass: tea
    policies:
      - name: external-auth-oauth2-snippets-policy
  - path: /coffee
    action:
      pass: coffee
