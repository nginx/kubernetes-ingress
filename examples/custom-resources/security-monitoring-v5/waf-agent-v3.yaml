# For use with NGINX Agent 3.* (NGINX One Console).
# Security logs are sent to the NGINX Agent embedded OpenTelemetry collector
# listening locally on 127.0.0.1:1514. Do not deploy syslog.yaml when using this policy.
apiVersion: k8s.nginx.org/v1
kind: Policy
metadata:
  name: waf-policy
spec:
  waf:
    enable: true
    apBundle: "<policy_bundle_name>.tgz"
    securityLogs:
    - enable: true
      apLogBundle: "<log_bundle_name>.tgz"
      logDest: "syslog:server=127.0.0.1:1514"
