# Test 17: Missing client secret. Policy references a secret that doesn't exist.
#
# Verify:
#   - `kubectl describe vs webapp | tail -10` -> Warning event mentioning the
#     missing `default/does-not-exist` secret.
#   - `kubectl logs -n nginx-ingress deploy/nginx-ingress | grep -i oidc` shows
#     the same warning.
#   - Browse https://${WEBAPP_HOST}/ -> 500 (no valid OIDC config).
apiVersion: k8s.nginx.org/v1
kind: Policy
metadata:
  name: test17-policy
spec:
  oidcNative:
    issuer: https://keycloak.example.com/realms/master
    clientID: nginx-plus
    clientSecret: does-not-exist
    sslVerify: false
---
apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: webapp
spec:
  host: webapp.example.com
  tls:
    secret: tls-secret
  policies:
    - name: test17-policy
  upstreams:
    - name: webapp
      service: webapp-svc
      port: 80
  routes:
    - path: /
      action:
        pass: webapp
