# Test 18: Wrong client secret type. Secret exists but is kubernetes.io/tls
# instead of nginx.org/oidc.
#
# Verify:
#   - `kubectl describe vs webapp | tail -10` -> Warning: "wrong type
#     'kubernetes.io/tls', must be 'nginx.org/oidc'".
#   - Browse https://${WEBAPP_HOST}/ -> 500.
apiVersion: v1
kind: Secret
metadata:
  name: test18-wrong-type
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
---
apiVersion: k8s.nginx.org/v1
kind: Policy
metadata:
  name: test18-policy
spec:
  oidcNative:
    issuer: https://keycloak.example.com/realms/master
    clientID: nginx-plus
    clientSecret: test18-wrong-type
    sslVerify: false
---
apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: webapp
spec:
  host: webapp.example.com
  tls:
    secret: tls-secret
  policies:
    - name: test18-policy
  upstreams:
    - name: webapp
      service: webapp-svc
      port: 80
  routes:
    - path: /
      action:
        pass: webapp
