apiVersion: k8s.nginx.org/v1
kind: Policy
metadata:
  name: cors-wildcard-policy
  annotations:
    description: "Public CORS Policy using wildcard origin (no credentials) following MDN guidelines"
spec:
  cors:
    # Wildcard allowed only when credentials are false per MDN guidelines
    allowOrigin:
      - "*"

    # Basic HTTP methods for public APIs
    allowMethods:
      - "GET"
      - "POST"
      - "OPTIONS"  # Required for preflight

    # Simple request headers that don't require preflight
    allowHeaders:
      - "Accept"
      - "Accept-Language"
      - "Content-Language"
      - "Content-Type"  # Only for specific MIME types in simple requests

    # Must be false when using wildcard origin per CORS security requirements
    allowCredentials: false

    # Standard preflight cache duration
    maxAge: 86400  # 24 hours

    # CORS headers are applied to all requests by default
