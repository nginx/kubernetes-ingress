# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: (^_vendor/|.*pb2.*)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '(\.md|\.jwt|\.snap|\.avdl)$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(charts/nginx-ingress/templates)
      - id: check-ast
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
        exclude: '(\.snap)$'
      - id: check-symlinks
      - id: check-case-conflict
      - id: check-vcs-permalinks
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys, --no-ensure-ascii]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: ^(tests/suite/utils|tests/suite/fixtures|tests/suite/grpc|tests/settings.py|tests/scripts)
      - id: no-commit-to-branch
      - id: requirements-txt-fixer
      - id: fix-byte-order-marker
      - id: detect-private-key

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        description: Fast linters runner for Go. Note that only modified files are linted, so linters like 'unused' that need to scan all files won't work as expected.
        entry: golangci-lint run --new-from-rev HEAD --fix
        types: [go]
        language: golang
        require_serial: true
        pass_filenames: false

      - id: test-workflow-gating
        name: test workflow gating script
        description: Runs unit tests for the workflow repository-gating validator.
        entry: .github/scripts/validate-workflow-gating_test.sh
        language: script
        files: ^\.github/scripts/validate-workflow-gating(_test)?\.sh$
        pass_filenames: false
        require_serial: true

      - id: test-ci-variables
        name: test ci variables script
        description: Runs unit tests for the CI decision logic in variables.sh.
        entry: .github/scripts/variables_test.sh
        language: script
        files: ^\.github/scripts/variables(_test)?\.sh$
        pass_filenames: false
        require_serial: true

      - id: validate-workflow-gating
        name: validate workflow gating
        description: Ensures every non-mirror workflow job is gated to the nginx/kubernetes-ingress repository.
        entry: .github/scripts/validate-workflow-gating.sh
        language: golang
        additional_dependencies: ["github.com/mikefarah/yq/v4@v4.53.3"]
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        files: tests/.*\.py$
        args:
          [
            "--in-place",
            "--remove-all-unused-imports",
            "--remove-unused-variable",
          ]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-jsonschema
        name: "Check Helm Chart JSON Schema"
        files: charts/nginx-ingress/values.yaml
        types: [yaml]
        args: ["--schemafile", "charts/nginx-ingress/values.schema.json"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
        args: [ "**/*.md", "--fix" ]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        description: Runs actionlint to lint GitHub Actions workflow files
        language: golang
        types: ["yaml"]
        files: ^\.github/workflows/
        entry: actionlint
        args: ["-shellcheck", ""]

ci:
  skip: [golangci-lint, check-jsonschema, markdownlint-cli2]
  autoupdate_schedule: quarterly # We use renovate for more frequent updates and there's no way to disable autoupdate
