##################################################################################################
# Profiling deployment for NGINX Ingress Controller
#
# Deploys NIC built with the `debug` build tag, which starts a pprof HTTP server on :6060.
# Delve is also available at /dlv for interactive debugging via kubectl exec.
#
# Usage:
#   make build-debug
#   make debian-image-profiling TAG=profiling
#   kind load docker-image nginx/nginx-ingress:profiling   # or minikube image load
#   kubectl apply -f deploy/crds.yaml
#   kubectl apply -f deployments/common/ns-and-sa.yaml
#   kubectl apply -f deployments/rbac/rbac.yaml
#   kubectl apply -f deployments/common/nginx-config.yaml
#   kubectl apply -f deployments/common/ingress-class.yaml
#   kubectl apply -f deployments/profiling/nginx-ingress-profiling.yaml
#
# Access pprof:
#   kubectl port-forward -n nginx-ingress deploy/nginx-ingress 6060:6060
#   go tool pprof http://localhost:6060/debug/pprof/profile?seconds=30
#   go tool pprof http://localhost:6060/debug/pprof/heap
#   curl http://localhost:6060/debug/pprof/goroutine?debug=2
##################################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ingress
  namespace: nginx-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-ingress
  template:
    metadata:
      labels:
        app: nginx-ingress
        app.kubernetes.io/name: nginx-ingress
    spec:
      serviceAccountName: nginx-ingress
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - image: nginx/nginx-ingress:profiling
        imagePullPolicy: IfNotPresent
        name: nginx-ingress
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
        - name: readiness-port
          containerPort: 8081
        - name: prometheus
          containerPort: 9113
        - name: pprof
          containerPort: 6060
        readinessProbe:
          httpGet:
            path: /nginx-ready
            port: readiness-port
          periodSeconds: 1
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 101 #nginx
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        args:
          - -nginx-configmaps=$(POD_NAMESPACE)/nginx-config
          - -report-ingress-status
          - -external-service=nginx-ingress
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-pprof
  namespace: nginx-ingress
spec:
  type: NodePort
  ports:
  - port: 6060
    targetPort: 6060
    protocol: TCP
    name: pprof
  selector:
    app: nginx-ingress
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress
  namespace: nginx-ingress
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: nginx-ingress
